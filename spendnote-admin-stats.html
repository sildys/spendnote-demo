<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
    <title>Admin Stats - SpendNote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css?v=23">
    <link rel="stylesheet" href="assets/css/app-layout.css?v=21">
    <style>
        .summary-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid var(--border, #e2e8f0);
            border-radius: 10px;
        }
        .summary-item {
            font-size: 12px;
            color: #64748b;
            padding: 4px 10px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            white-space: nowrap;
        }
        .summary-item strong {
            color: #0f172a;
            font-weight: 800;
            margin-right: 3px;
        }
        .summary-item.highlight {
            background: #ecfdf5;
            border-color: rgba(5, 150, 105, 0.2);
        }
        .summary-item.highlight strong {
            color: #059669;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            color: #0f172a;
            margin: 24px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            color: #64748b;
            font-size: 13px;
        }

        .table-wrap {
            background: #fff;
            border: 1px solid var(--border, #e2e8f0);
            border-radius: 12px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .user-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .user-table th {
            text-align: left;
            font-weight: 700;
            color: #64748b;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 10px;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 2;
        }
        .user-table th:hover {
            color: #0f172a;
        }
        .user-table th .sort-icon {
            margin-left: 3px;
            font-size: 9px;
            color: #94a3b8;
        }
        .user-table th .sort-icon.active {
            color: #059669;
        }
        .user-table td {
            padding: 7px 10px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            white-space: nowrap;
        }
        .user-table tr:hover td {
            background: #f8fafc;
        }
        .user-table tr.unconfirmed td {
            opacity: 0.5;
        }

        .tier-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .tier-preview { background: #e0e7ff; color: #4338ca; }
        .tier-free { background: #f1f5f9; color: #64748b; }
        .tier-standard { background: #fef3c7; color: #b45309; }
        .tier-pro { background: #dbeafe; color: #1d4ed8; }
        .tier-admin { background: #fce7f3; color: #be185d; }
        .tier-user { background: #f0fdf4; color: #15803d; }
        .tier-owner { background: #dbeafe; color: #1d4ed8; }
        .tier-unknown { background: #f1f5f9; color: #94a3b8; }

        .team-info {
            font-size: 10px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .team-info i { font-size: 9px; }

        .date-cell {
            font-size: 11px;
            color: #94a3b8;
        }
        .date-cell.recent {
            color: #059669;
            font-weight: 600;
        }
        .date-cell.stale {
            color: #dc2626;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .filter-btn {
            font-size: 11px;
            padding: 4px 10px;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
        }
        .filter-btn:hover { background: #f8fafc; }
        .filter-btn.active {
            background: #0f172a;
            color: #fff;
            border-color: #0f172a;
        }

        .search-input {
            font-size: 12px;
            padding: 5px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            outline: none;
            width: 200px;
        }
        .search-input:focus {
            border-color: #059669;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 15px;
        }
        .loading-state i {
            font-size: 28px;
            margin-bottom: 12px;
            display: block;
        }
        .error-state {
            text-align: center;
            padding: 40px 20px;
            color: #dc2626;
            background: #fef2f2;
            border-radius: 12px;
            font-size: 14px;
        }
        .refresh-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f172a;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, 0.2);
            z-index: 100;
        }
        .refresh-btn:hover { background: #1e293b; }
        .generated-at {
            font-size: 11px;
            color: #94a3b8;
            text-align: right;
            margin-top: 8px;
        }
        .count-badge {
            background: #e2e8f0;
            color: #475569;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 6px;
        }
    </style>
</head>
<body>
<div id="nav-container"></div>

<div class="app-container">
    <main class="main-content">
        <div class="page-header">
            <div class="page-title-group">
                <h1 class="page-title"><i class="fas fa-chart-bar" style="color:#059669;margin-right:8px;"></i>Admin Dashboard</h1>
                <p class="page-subtitle">Real-time usage statistics</p>
            </div>
        </div>

        <div id="statsContent">
            <div class="loading-state" id="loadingState">
                <i class="fas fa-spinner fa-spin"></i>
                Loading statistics...
            </div>
        </div>
    </main>
</div>

<button class="refresh-btn" id="refreshBtn" style="display:none;" onclick="loadStats()">
    <i class="fas fa-sync-alt"></i> Frissítés
</button>

<footer class="app-footer">
    <div class="app-footer-container">
        <div class="app-footer-top">
            <div class="app-footer-brand">
                <a href="dashboard.html" class="app-footer-brand-logo">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none"><path d="M12 4 C10.895 4 10 4.895 10 6 L10 38 L12 36 L14 38 L16 36 L18 38 L20 36 L22 38 L24 36 L26 38 L28 36 L30 38 L32 36 L34 38 L36 36 L38 38 L38 6 C38 4.895 37.105 4 36 4 Z" fill="white"/><path d="M32 4 L38 10 L32 10 Z" fill="rgba(0,0,0,0.15)"/></svg>
                    <span>SpendNote</span>
                </a>
            </div>
        </div>
        <div class="app-footer-bottom"><div class="app-footer-copyright">2026 SpendNote. Admin only.</div></div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js?v=20260407-recovery-fix"></script>
<script src="assets/js/auth-guard.js?v=20260223-1949"></script>
<script src="assets/js/nav-loader.js?v=20260407-nav-fix"></script>
<script>loadNav();</script>
<script src="assets/js/main.js?v=44"></script>
<script>
(async function() {
    window.loadStats = async function() {
        const content = document.getElementById('statsContent');
        const refreshBtn = document.getElementById('refreshBtn');
        content.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-spin"></i>Loading statistics...</div>';
        refreshBtn.style.display = 'none';

        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                content.innerHTML = '<div class="error-state"><i class="fas fa-lock"></i> Nem vagy bejelentkezve.</div>';
                return;
            }

            const resp = await fetch(`${SUPABASE_URL}/functions/v1/admin-stats`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}`,
                    'apikey': SUPABASE_ANON_KEY
                },
                body: '{}'
            });

            if (resp.status === 403) {
                content.innerHTML = '<div class="error-state"><i class="fas fa-ban"></i> Nincs jogosultságod az admin oldal megtekintéséhez.</div>';
                return;
            }
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || `HTTP ${resp.status}`);
            }

            const d = await resp.json();
            renderStats(d);
            refreshBtn.style.display = 'flex';
        } catch (err) {
            content.innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i> Hiba: ${err.message}</div>`;
            refreshBtn.style.display = 'flex';
        }
    };

    let _allUsers = [];
    let _currentFilter = 'all';
    let _currentSort = { col: 'created', dir: 'desc' };
    let _searchQuery = '';

    function renderStats(d) {
        const content = document.getElementById('statsContent');
        const u = d.users;
        const tx = d.transactions;
        const cb = d.cashBoxes;
        const t = d.teams;

        _allUsers = u.recentSignups || [];

        let html = '';

        // --- COMPACT SUMMARY BAR ---
        html += '<div class="summary-bar">';
        html += `<span class="summary-item highlight"><strong>${u.total}</strong> felhasználó</span>`;
        html += `<span class="summary-item ${u.paying > 0 ? 'highlight' : ''}"><strong>${u.paying}</strong> fizető</span>`;
        html += `<span class="summary-item"><strong>${tx.total}</strong> tranzakció</span>`;
        html += `<span class="summary-item"><strong>${cb.total}</strong> kassza</span>`;
        html += `<span class="summary-item"><strong>${t.totalOrgs}</strong> team</span>`;
        html += `<span class="summary-item"><strong>${d.contacts.total}</strong> kontakt</span>`;
        html += `<span class="summary-item"><strong>${u.thisWeek}</strong> reg (7d)</span>`;
        html += `<span class="summary-item"><strong>${tx.thisWeek}</strong> tx (7d)</span>`;
        if (t.pendingInvites > 0) html += `<span class="summary-item" style="background:#fffbeb;border-color:#fbbf24;"><strong>${t.pendingInvites}</strong> pending invite</span>`;
        html += '</div>';

        // --- FILTER + SEARCH ---
        html += '<div class="filter-bar">';
        html += '<input type="text" class="search-input" id="userSearch" placeholder="Keresés (email, név)..." />';
        const filters = [
            { key: 'all', label: 'Mind' },
            { key: 'paying', label: 'Fizető' },
            { key: 'free', label: 'Free' },
            { key: 'team_owner', label: 'Team owner' },
            { key: 'team_member', label: 'Team member' },
            { key: 'unconfirmed', label: 'Nem megerősített' },
            { key: 'active_7d', label: 'Aktív (7d)' },
            { key: 'inactive', label: 'Inaktív' },
        ];
        for (const f of filters) {
            html += `<button class="filter-btn ${f.key === _currentFilter ? 'active' : ''}" data-filter="${f.key}">${f.label}</button>`;
        }
        html += '</div>';

        // --- TABLE ---
        html += '<div class="section-title"><i class="fas fa-users"></i> Felhasználók <span class="count-badge" id="userCount">${_allUsers.length}</span></div>';
        html += '<div class="table-wrap" style="max-height:70vh;overflow-y:auto;">';
        html += '<table class="user-table" id="userTable">';
        html += '<thead><tr>';
        const cols = [
            { key: 'email', label: 'Email' },
            { key: 'name', label: 'Név' },
            { key: 'tier', label: 'Szint/Role' },
            { key: 'team', label: 'Team' },
            { key: 'cashBoxes', label: 'Kasszák' },
            { key: 'transactions', label: 'Receiptek' },
            { key: 'lastSignIn', label: 'Utolsó login' },
            { key: 'lastTx', label: 'Utolsó tx' },
            { key: 'created', label: 'Regisztráció' },
        ];
        for (const c of cols) {
            const isActive = _currentSort.col === c.key;
            const arrow = isActive ? (_currentSort.dir === 'asc' ? '▲' : '▼') : '⇅';
            html += `<th data-sort="${c.key}">${c.label} <span class="sort-icon ${isActive ? 'active' : ''}">${arrow}</span></th>`;
        }
        html += '</tr></thead>';
        html += '<tbody id="userTableBody"></tbody>';
        html += '</table></div>';

        // --- GENERATED AT ---
        if (d.generatedAt) {
            const gen = new Date(d.generatedAt).toLocaleString('hu-HU');
            html += `<div class="generated-at">Generálva: ${gen}</div>`;
        }

        content.innerHTML = html;

        // Bind events
        document.getElementById('userSearch')?.addEventListener('input', (e) => {
            _searchQuery = String(e.target.value || '').trim().toLowerCase();
            renderUserTable();
        });
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                _currentFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderUserTable();
            });
        });
        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.sort;
                if (_currentSort.col === col) {
                    _currentSort.dir = _currentSort.dir === 'asc' ? 'desc' : 'asc';
                } else {
                    _currentSort = { col, dir: 'desc' };
                }
                renderStats(d);
            });
        });

        renderUserTable();
    }

    function renderUserTable() {
        const now = new Date();
        const weekAgo = new Date(now.getTime() - 7 * 86400000).toISOString();

        let rows = [..._allUsers];

        // Filter
        if (_currentFilter === 'paying') rows = rows.filter(s => s.billing === 'active');
        else if (_currentFilter === 'free') rows = rows.filter(s => s.rawTier === 'free' || s.tier === 'free');
        else if (_currentFilter === 'team_owner') rows = rows.filter(s => s.orgRole === 'owner');
        else if (_currentFilter === 'team_member') rows = rows.filter(s => s.orgRole && s.orgRole !== 'owner');
        else if (_currentFilter === 'unconfirmed') rows = rows.filter(s => s.confirmed === false);
        else if (_currentFilter === 'active_7d') rows = rows.filter(s => s.lastSignIn && s.lastSignIn >= weekAgo);
        else if (_currentFilter === 'inactive') rows = rows.filter(s => !s.lastSignIn || s.lastSignIn < weekAgo);

        // Search
        if (_searchQuery) {
            rows = rows.filter(s =>
                String(s.email || '').toLowerCase().includes(_searchQuery) ||
                String(s.name || '').toLowerCase().includes(_searchQuery) ||
                String(s.orgName || '').toLowerCase().includes(_searchQuery)
            );
        }

        // Sort
        const col = _currentSort.col;
        const dir = _currentSort.dir === 'asc' ? 1 : -1;
        rows.sort((a, b) => {
            let va = a[col], vb = b[col];
            if (col === 'team') { va = a.orgName || ''; vb = b.orgName || ''; }
            if (col === 'cashBoxes' || col === 'transactions') return (Number(va || 0) - Number(vb || 0)) * dir;
            return String(va || '').localeCompare(String(vb || '')) * dir;
        });

        // Update count
        const countEl = document.getElementById('userCount');
        if (countEl) countEl.textContent = rows.length;

        const now2 = Date.now();
        const tbody = document.getElementById('userTableBody');
        if (!tbody) return;

        let html = '';
        for (const s of rows) {
            const tierClass = 'tier-' + (s.tier || 'unknown');
            const tierLabel = (s.tier || '?').charAt(0).toUpperCase() + (s.tier || '?').slice(1);
            const unconfClass = s.confirmed === false ? ' unconfirmed' : '';

            // Team column
            let teamHtml = '-';
            if (s.orgName) {
                const roleIcon = s.orgRole === 'owner' ? 'fa-crown' : s.orgRole === 'admin' ? 'fa-user-shield' : 'fa-user';
                teamHtml = `<div class="team-info"><i class="fas ${roleIcon}"></i> ${esc(s.orgName)} <span style="opacity:0.6;">(${s.teamSize || 1})</span></div>`;
            }

            // Date formatting helper
            const fmtDate = (d) => {
                if (!d) return '-';
                return new Date(d).toLocaleDateString('hu-HU', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            };
            const dateClass = (d) => {
                if (!d) return 'date-cell';
                const ms = now2 - new Date(d).getTime();
                if (ms < 2 * 86400000) return 'date-cell recent';
                if (ms > 14 * 86400000) return 'date-cell stale';
                return 'date-cell';
            };

            html += `<tr class="${unconfClass}">
                <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;">${esc(s.email)}${s.confirmed === false ? ' <i class="fas fa-exclamation-circle" style="color:#d97706;font-size:10px;" title="Nem megerősített"></i>' : ''}</td>
                <td>${esc(s.name || '-')}</td>
                <td><span class="tier-badge ${tierClass}">${tierLabel}</span></td>
                <td>${teamHtml}</td>
                <td style="text-align:center;font-weight:700;">${s.cashBoxes || 0}</td>
                <td style="text-align:center;font-weight:700;">${s.transactions || 0}</td>
                <td class="${dateClass(s.lastSignIn)}">${fmtDate(s.lastSignIn)}</td>
                <td class="${dateClass(s.lastTx)}">${fmtDate(s.lastTx)}</td>
                <td class="date-cell">${fmtDate(s.created)}</td>
            </tr>`;
        }

        if (rows.length === 0) {
            html = '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px;">Nincs találat</td></tr>';
        }

        tbody.innerHTML = html;
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = String(s || '');
        return d.innerHTML;
    }

    // Auto-load
    loadStats();
})();
</script>
</body>
</html>
